- title: "How to Price Your First Rental Property"
  theme: RealEstate
  keywords: "property, investment, rental yield"
  notes: |
    Walk a first-time landlord through the key numbers.
    Cover yield calculation, vacancy rate buffer, and common pricing mistakes.
    Keep maths simple — show the formula with a worked example.

- title: "5 Mistakes New Dog Owners Make in the First Month"
  theme: Pets
  keywords: "dog training, puppy, habits"
  notes: |
    Warm and reassuring tone — not shaming.
    Practical fixes for each mistake.
    Focus on behaviour shaping in the first critical weeks.

- title: "What to Pack for a Two-Week Trip to Japan"
  theme: Travel
  keywords: "Japan, travel packing, minimalist travel"
  notes: |
    Opinionated and specific — no generic packing list.
    Assume first-time visitor to Japan.
    Cover weather layering, walking distances, cultural norms, tech (SIM, IC card).

- title: "Why Your SaaS Onboarding Is Losing You Customers"
  theme: SaaS
  keywords: "onboarding, churn, user experience"
  notes: |
    Written for founders and product teams.
    Focus on the first 7-day user experience.
    Use concrete examples of what good vs bad onboarding looks like.

- title: "The Beginner's Guide to Intermittent Fasting"
  theme: Health
  keywords: "fasting, nutrition, weight loss"
  notes: |
    Clear, no-hype explanation of the 16:8 method primarily.
    Address common fears (muscle loss, hunger, social eating) honestly.
    End with a simple way to start this week.

- title: "How to Write a Cover Letter That Gets Read"
  theme: Career
  keywords: "cover letter, job search, writing"
  notes: |
    Most cover letters are ignored — explain why before giving the fix.
    Give a specific structure with a worked example.
    Include a clear list of what NOT to do.

- title: "10 Easy Weeknight Dinners Under 30 Minutes"
  theme: Food
  keywords: "recipes, quick meals, weeknight cooking"
  notes: |
    Each suggestion must be genuinely fast with common supermarket ingredients.
    Skip anything requiring exotic items or specialist equipment.
    Include one vegetarian option at minimum.

- title: "Understanding Your Credit Score for the First Time"
  theme: Finance
  keywords: "credit score, personal finance, credit building"
  notes: |
    Plain-language explanation for someone who has never thought about credit.
    Zero jargon — define every term used.
    End with 3 specific actions to take this week to improve their score.
